name: Visual Box Drawing Test (WebKit)
on: workflow_dispatch

jobs:
  webkit-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm install playwright
      - run: npx playwright install webkit --with-deps
      - run: node tests/visual/screenshot.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: box-drawing-screenshot
          path: tests/visual/box-drawing-result.png
