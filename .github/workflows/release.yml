name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_target: ''
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Sync version in tauri.conf.json from the git tag (strip leading 'v')
      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          node -e "const f='src-tauri/tauri.conf.json';const j=JSON.parse(require('fs').readFileSync(f,'utf-8'));j.version='$VERSION';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n');"
          node -e "const f='package.json';const j=JSON.parse(require('fs').readFileSync(f,'utf-8'));j.version='$VERSION';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n');"
          # Cargo.toml: simple sed replacement of the first version line
          node -e "const fs=require('fs');const f='src-tauri/Cargo.toml';let c=fs.readFileSync(f,'utf-8');c=c.replace(/^version = \"[^\"]*\"/m,'version = \"$VERSION\"');fs.writeFileSync(f,c);"

      - name: Build Tauri app
        # Pinned to specific tag (not @v0) so that breaking changes in
        # tauri-action don't silently break our release pipeline.
        uses: tauri-apps/tauri-action@v0.5.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Intentionally NOT setting TAURI_SIGNING_PRIVATE_KEY_PASSWORD.
          # If the key was generated without a password, omitting this var
          # is the correct way to indicate "no password". Setting it to an
          # empty string causes signing to fail silently on some Tauri versions.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Ibis Hub ${{ github.ref_name }}'
          releaseBody: 'See the assets for download links.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true

      # Workaround: tauri-action sometimes fails to upload .sig files because
      # it looks for them under the renamed asset path while the bundler emits
      # them under the original path. Find and upload them manually so the
      # final assemble-latest-json job can construct latest.json.
      # Manually sign updater bundles. tauri-action's bundler creates .app.tar.gz
      # via plain `tar czf` without signing, so we sign them ourselves with the
      # tauri CLI (already installed globally by tauri-action).
      - name: Sign and upload updater bundles
        if: matrix.platform != 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"

          # Locate any .app.tar.gz files. tauri-action may have already deleted
          # them after upload, so re-create from .app directory if needed.
          for app_dir in src-tauri/target/*/release/bundle/macos/*.app; do
            [ -d "$app_dir" ] || continue
            bundle_dir="$(dirname "$app_dir")"
            app_name="$(basename "$app_dir")"            # "Ibis Hub.app"
            tar_path="$bundle_dir/${app_name}.tar.gz"     # "Ibis Hub.app.tar.gz"

            if [ ! -f "$tar_path" ]; then
              echo "Re-creating $tar_path from $app_dir"
              (cd "$bundle_dir" && tar czf "${app_name}.tar.gz" "$app_name")
            fi

            echo "Signing $tar_path"
            # tauri signer sign reads TAURI_SIGNING_PRIVATE_KEY from env.
            # Use --password '' for keys without a password.
            npx --yes @tauri-apps/cli@v2 signer sign --password "" "$tar_path" || \
              tauri signer sign --password "" "$tar_path" || \
              echo "WARNING: signing failed for $tar_path"

            sig_path="${tar_path}.sig"
            if [ -f "$sig_path" ]; then
              # Determine renamed asset name based on target arch
              target_dir="$(echo "$app_dir" | sed 's|.*/target/\([^/]*\)/.*|\1|')"
              case "$target_dir" in
                aarch64-apple-darwin) renamed="Ibis.Hub_aarch64.app.tar.gz.sig" ;;
                x86_64-apple-darwin)  renamed="Ibis.Hub_x64.app.tar.gz.sig" ;;
                *) renamed="$(basename "$sig_path")" ;;
              esac
              cp "$sig_path" "/tmp/$renamed"
              echo "Uploading $renamed to release ${GITHUB_REF_NAME}"
              gh release upload "$GITHUB_REF_NAME" "/tmp/$renamed" --repo "$GITHUB_REPOSITORY" --clobber
            else
              echo "ERROR: no .sig produced at $sig_path"
              ls -la "$bundle_dir" || true
            fi
          done

          # Linux: sign AppImage if present
          for app_image in src-tauri/target/release/bundle/appimage/*.AppImage; do
            [ -f "$app_image" ] || continue
            echo "Signing $app_image"
            npx --yes @tauri-apps/cli@v2 signer sign --password "" "$app_image" || \
              echo "WARNING: signing failed for $app_image"
            sig_path="${app_image}.sig"
            if [ -f "$sig_path" ]; then
              renamed="Ibis.Hub_${VERSION}_amd64.AppImage.sig"
              cp "$sig_path" "/tmp/$renamed"
              gh release upload "$GITHUB_REF_NAME" "/tmp/$renamed" --repo "$GITHUB_REPOSITORY" --clobber
            fi
          done

      - name: Upload updater signature files (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $sigFiles = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "*.sig" -ErrorAction SilentlyContinue
          if (-not $sigFiles) {
            Write-Host "No .sig files found — signing may have failed"
            exit 0
          }
          foreach ($sig in $sigFiles) {
            Write-Host "Found sig: $($sig.FullName)"
            # Windows updater bundles are .nsis.zip
            if ($sig.Name -like "*nsis*" -or $sig.FullName -like "*nsis*") {
              $renamed = "Ibis.Hub_x64-setup.nsis.zip.sig"
            } elseif ($sig.Name -like "*msi*" -or $sig.FullName -like "*msi*") {
              $renamed = "Ibis.Hub_x64_en-US.msi.zip.sig"
            } else {
              $renamed = $sig.Name
            }
            $tmpPath = Join-Path $env:TEMP $renamed
            Copy-Item $sig.FullName $tmpPath -Force
            Write-Host "Uploading $renamed to release $env:GITHUB_REF_NAME"
            gh release upload $env:GITHUB_REF_NAME $tmpPath --repo $env:GITHUB_REPOSITORY --clobber
          }

  # After all builds, assemble latest.json from the .sig files now in the release
  assemble-latest-json:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="$GITHUB_REPOSITORY"
          TAG="$GITHUB_REF_NAME"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          mkdir -p /tmp/sigs
          cd /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" || true
          ls -la

          # Map (platform_key -> sig_filename, asset_filename)
          declare -A PLATFORMS=(
            ["darwin-aarch64"]="Ibis.Hub_aarch64.app.tar.gz.sig|Ibis.Hub_aarch64.app.tar.gz"
            ["darwin-x86_64"]="Ibis.Hub_x64.app.tar.gz.sig|Ibis.Hub_x64.app.tar.gz"
            ["windows-x86_64"]="Ibis.Hub_x64-setup.nsis.zip.sig|Ibis.Hub_x64-setup.nsis.zip"
            ["linux-x86_64"]="Ibis.Hub_${VERSION}_amd64.AppImage.sig|Ibis.Hub_${VERSION}_amd64.AppImage"
          )

          # Build platforms object using jq, only including entries with valid sigs
          PLATFORMS_JSON='{}'
          for key in "${!PLATFORMS[@]}"; do
            IFS='|' read -r sig_file asset_file <<< "${PLATFORMS[$key]}"
            if [ -f "$sig_file" ] && [ -s "$sig_file" ]; then
              SIG_CONTENT=$(cat "$sig_file" | tr -d '\n')
              URL="${BASE_URL}/${asset_file}"
              PLATFORMS_JSON=$(echo "$PLATFORMS_JSON" | jq --arg k "$key" --arg s "$SIG_CONTENT" --arg u "$URL" '. + {($k): {signature: $s, url: $u}}')
              echo "✓ Added platform $key"
            else
              echo "✗ Skipping $key (no signature file)"
            fi
          done

          echo "$PLATFORMS_JSON" | jq \
            --arg v "$VERSION" \
            --arg n "See release notes at https://github.com/${REPO}/releases/tag/${TAG}" \
            --arg d "$PUB_DATE" \
            '{version: $v, notes: $n, pub_date: $d, platforms: .}' > /tmp/latest.json

          echo "--- latest.json ---"
          cat /tmp/latest.json

          # Verify we have at least one platform before uploading
          PLATFORM_COUNT=$(jq '.platforms | length' /tmp/latest.json)
          if [ "$PLATFORM_COUNT" -eq 0 ]; then
            echo "ERROR: latest.json has no platforms — aborting"
            exit 1
          fi

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
          echo "✓ latest.json uploaded with $PLATFORM_COUNT platform(s)"

  # End-to-end verification: download latest.json from the freshly published
  # release and cryptographically verify the signatures match the bundles.
  # This is the same chain that the in-app Tauri updater performs, run from
  # CI so we get a guarantee that auto-update will work — without needing
  # any Mac user to test it.
  verify-updater-chain:
    needs: assemble-latest-json
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Same system libraries as the build job — Cargo resolves the whole
      # workspace's dependency graph even when building only one bin, so
      # tauri's transitive glib/webkit deps must be present.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build verify-updater binary
        working-directory: src-tauri
        run: cargo build --bin verify-updater --release

      - name: Wait for release CDN to propagate
        run: sleep 30

      - name: Verify darwin-aarch64
        working-directory: src-tauri
        env:
          VERIFY_UPDATER_PLATFORM: darwin-aarch64
        run: ./target/release/verify-updater

      - name: Verify darwin-x86_64
        working-directory: src-tauri
        env:
          VERIFY_UPDATER_PLATFORM: darwin-x86_64
        run: ./target/release/verify-updater

      - name: Verify linux-x86_64
        working-directory: src-tauri
        env:
          VERIFY_UPDATER_PLATFORM: linux-x86_64
        run: ./target/release/verify-updater

      # Once all platforms verify, automatically publish the draft release.
      # If any verify step above fails, this step is skipped, leaving the
      # release as a draft so a broken auto-update can never go live.
      - name: Publish release (only after all signature checks pass)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --draft=false --repo "$GITHUB_REPOSITORY"
          echo "✓ Release $GITHUB_REF_NAME is now public"
