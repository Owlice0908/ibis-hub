name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            name: macOS (arm64)
            rust_target: aarch64-apple-darwin
          - platform: windows-latest
            name: Windows
            rust_target: ''
          - platform: ubuntu-22.04
            name: Ubuntu
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # ---------- Frontend checks ----------
      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Frontend build
        run: npx vite build

      - name: Frontend unit tests (vitest)
        run: npm test

      # ---------- Rust checks ----------
      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check
        continue-on-error: true

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --lib --verbose

      # ---------- Build Tauri app (verifies full build works) ----------
      - name: Build Tauri app
        working-directory: src-tauri
        run: cargo build --release
        env:
          # Skip code signing in test builds
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      # ---------- macOS smoke test: launch app and verify it doesn't crash ----------
      - name: macOS app smoke test
        if: matrix.platform == 'macos-latest'
        run: |
          set -e
          BINARY="src-tauri/target/release/ibis-hub"
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: binary not found at $BINARY"
            ls -la src-tauri/target/release/
            exit 1
          fi
          echo "Launching $BINARY in background..."
          # Launch the app, capture stdout/stderr, kill after 5 seconds
          ( "$BINARY" > /tmp/ibis-stdout.log 2> /tmp/ibis-stderr.log & echo $! > /tmp/ibis.pid ) || true
          sleep 5
          PID=$(cat /tmp/ibis.pid 2>/dev/null || echo "")
          if [ -n "$PID" ] && kill -0 "$PID" 2>/dev/null; then
            echo "✓ App is still running after 5s (no crash)"
            kill "$PID" 2>/dev/null || true
          else
            echo "✗ App crashed within 5s"
            echo "--- stdout ---"
            cat /tmp/ibis-stdout.log || true
            echo "--- stderr ---"
            cat /tmp/ibis-stderr.log || true
            echo "--- ibis-hub.log ---"
            cat ~/ibis-hub.log 2>/dev/null || echo "(no log file)"
            exit 1
          fi
          echo "--- ibis-hub.log (startup) ---"
          cat ~/ibis-hub.log 2>/dev/null || echo "(no log file)"

      # ---------- Upload logs on failure ----------
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.name }}
          path: |
            /tmp/ibis-*.log
            ~/ibis-hub.log
          if-no-files-found: ignore
