<!DOCTYPE html>
<html>
<head>
  <title>Box Drawing Visual Test</title>
  <style>
    body { background: #0f0f0f; margin: 20px; }
    #terminal { width: 600px; height: 300px; }
    #status { color: #22c55e; font-family: monospace; margin-top: 10px; white-space: pre; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <div id="status"></div>
  <script type="module">
    import { Terminal } from '/node_modules/@xterm/xterm/lib/xterm.mjs';
    import '/node_modules/@xterm/xterm/css/xterm.css';

    const terminal = new Terminal({
      fontFamily: "'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Source Han Mono', 'Noto Sans Mono CJK JP', 'MS Gothic', monospace",
      fontSize: 14,
      cols: 60,
      rows: 12,
      theme: { background: '#0f0f0f', foreground: '#e5e5e5' },
    });

    terminal.open(document.getElementById('terminal'));

    // Same fixed-box provider as TerminalPane.tsx
    try {
      const baseProvider = terminal._core?._unicodeService?._activeProvider;
      if (baseProvider) {
        const fixedProvider = {
          version: 'fixed-box',
          wcwidth: (cp) => {
            if (cp >= 0x2500 && cp <= 0x259f) return 1;
            return baseProvider.wcwidth(cp);
          },
          charProperties: (codepoint, preceding) => {
            if (baseProvider.charProperties) {
              const props = baseProvider.charProperties(codepoint, preceding);
              if (codepoint >= 0x2500 && codepoint <= 0x259f) {
                return (props & ~0b110) | (1 << 1);
              }
              return props;
            }
            const w = (codepoint >= 0x2500 && codepoint <= 0x259f) ? 1 : baseProvider.wcwidth(codepoint);
            return (w << 1);
          },
        };
        terminal.unicode.register(fixedProvider);
        terminal.unicode.activeVersion = 'fixed-box';
        document.getElementById('status').textContent += 'Provider: fixed-box active\n';
      }
    } catch (e) {
      document.getElementById('status').textContent += 'Provider: FAILED ' + e + '\n';
    }

    // Write test content
    terminal.write('=== Box Drawing Test (should be SOLID lines) ===\r\n\r\n');
    terminal.write('┌──────────────────────────────────────────────────┐\r\n');
    terminal.write('│ This is an input box (like Claude Code)         │\r\n');
    terminal.write('└──────────────────────────────────────────────────┘\r\n');
    terminal.write('\r\n');
    terminal.write('────────────────────────────────────────────────────\r\n');
    terminal.write('❯ cursor here\r\n');
    terminal.write('────────────────────────────────────────────────────\r\n');

    // Width diagnostics
    const provider = terminal.unicode._activeVersion === 'fixed-box'
      ? terminal._core?._unicodeService?._activeProvider : null;
    const chars = [
      { cp: 0x2500, name: '─' }, { cp: 0x2502, name: '│' },
      { cp: 0x250c, name: '┌' }, { cp: 0x2510, name: '┐' },
    ];
    let report = 'Widths: ';
    for (const { cp, name } of chars) {
      const w = provider?.wcwidth?.(cp) ?? '?';
      report += `${name}=${w} `;
    }
    document.getElementById('status').textContent += report + '\n';

    window.__TEST_DONE__ = true;
  </script>
</body>
</html>
